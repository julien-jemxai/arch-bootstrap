# ~/.config/hypr/hyprland.conf
# Generated by arch-bootstrap. Edit freely after dropping in.

# ============================================================
# NVIDIA — required, or you get black screens / missing cursors
# ============================================================
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
env = ELECTRON_OZONE_PLATFORM_HINT,auto

cursor {
  no_hardware_cursors = true
}

# ============================================================
# Monitors — replace if external display attached
# ============================================================
monitor = , preferred, auto, 1

# ============================================================
# Autostart
# ============================================================
exec-once = waybar
exec-once = mako
exec-once = hypridle
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = wl-paste --watch cliphist store
# exec-once = hyprpaper   # uncomment once ~/.config/hypr/hyprpaper.conf exists

# ============================================================
# Input
# ============================================================
input {
  kb_layout = us
  follow_mouse = 1
  touchpad {
    natural_scroll = yes
    tap-to-click = yes
    disable_while_typing = yes
  }
  sensitivity = 0
}

# ============================================================
# Look
# ============================================================
general {
  gaps_in = 4
  gaps_out = 8
  border_size = 2
  layout = dwindle
}

decoration {
  rounding = 6
  blur {
    enabled = true
    size = 6
    passes = 2
  }
}

animations {
  enabled = yes
  bezier = ease, 0.25, 0.1, 0.25, 1
  animation = windows, 1, 5, ease
  animation = fade, 1, 5, ease
  animation = workspaces, 1, 5, ease
}

# ============================================================
# Keybinds — day-one spine
# ============================================================
$mod = SUPER

# Apps
bind = $mod, Return, exec, ghostty
bind = $mod, B, exec, zen-browser
bind = $mod, O, exec, obsidian
bind = $mod, D, exec, fuzzel
bind = $mod, E, exec, nautilus

# Window mgmt
bind = $mod, Q, killactive
bind = $mod, F, fullscreen
bind = $mod, V, togglefloating
bind = $mod SHIFT, R, exec, hyprctl reload
bind = $mod SHIFT, E, exit

# Workspaces 1-9
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

# Focus (vim-style)
bind = $mod, h, movefocus, l
bind = $mod, l, movefocus, r
bind = $mod, k, movefocus, u
bind = $mod, j, movefocus, d

# Screenshots
bind = , Print, exec, grimblast copysave area - | satty -f -
bind = SHIFT, Print, exec, grimblast copysave screen - | satty -f -

# Clipboard history
bind = $mod, X, exec, cliphist list | fuzzel --dmenu | cliphist decode | wl-copy

# Fn keys — brightness
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set +5%
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Fn keys — audio
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Media keys
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPrev,  exec, playerctl previous

# Mouse window mgmt
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow
